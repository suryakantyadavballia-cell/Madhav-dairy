<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Clock - Multiple Time Zones</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.container {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 40px;
    box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
    border: 1px solid rgba(255, 255, 255, 0.18);
    max-width: 1000px;
    width: 100%;
}

h1 {
    color: white;
    text-align: center;
    margin-bottom: 40px;
    font-size: 2.5em;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
}

.clocks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.clock-card {
    background: rgba(255, 255, 255, 0.15);
    border-radius: 15px;
    padding: 25px;
    text-align: center;
    border: 2px solid rgba(255, 255, 255, 0.3);
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}

.clock-card:hover {
    background: rgba(255, 255, 255, 0.25);
    transform: translateY(-5px);
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
}

.timezone-name {
    color: #ffffff;
    font-size: 1.2em;
    font-weight: bold;
    margin-bottom: 10px;
    text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
}

.time-display {
    background: rgba(0, 0, 0, 0.3);
    color: #00ff88;
    font-size: 2.5em;
    font-weight: bold;
    padding: 20px;
    border-radius: 10px;
    font-family: 'Courier New', monospace;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
    margin-bottom: 10px;
}

.date-display {
    color: #e0e0e0;
    font-size: 0.9em;
    margin-top: 10px;
}

.region-info {
    color: #b0e0ff;
    font-size: 0.85em;
    margin-top: 8px;
}

.controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 30px;
    flex-wrap: wrap;
}

button {
    background: rgba(255, 255, 255, 0.2);
    color: white;
    border: 2px solid white;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1em;
    transition: all 0.3s ease;
    font-weight: bold;
}

button:hover {
    background: rgba(255, 255, 255, 0.4);
    transform: scale(1.05);
}

button:active {
    transform: scale(0.95);
}

.footer {
    text-align: center;
    color: rgba(255, 255, 255, 0.8);
    margin-top: 20px;
    font-size: 0.9em;
}
</style>
</head>

<body>

<div class="container">
    <h1>🕐 Digital World Clock</h1>
    
    <div class="clocks-grid" id="clocksContainer">
        <!-- Clock cards will be generated here -->
    </div>
    
    <div class="controls">
        <button onclick="toggle12Hour()">Toggle 12/24 Hour</button>
        <button onclick="addRandomTimeZone()">Add Random Timezone</button>
        <button onclick="resetClocks()">Reset to Default</button>
    </div>
    
    <div class="footer">
        <p>All times update in real-time</p>
    </div>
</div>

<script>
let use24Hour = true;
let timeZones = [
    { name: 'India (IST)', tz: 'Asia/Kolkata', region: 'भारत' },
    { name: 'New York (EST)', tz: 'America/New_York', region: 'USA' },
    { name: 'London (GMT)', tz: 'Europe/London', region: 'UK' },
    { name: 'Tokyo (JST)', tz: 'Asia/Tokyo', region: 'Japan' },
    { name: 'Sydney (AEDT)', tz: 'Australia/Sydney', region: 'Australia' },
    { name: 'Dubai (GST)', tz: 'Asia/Dubai', region: 'UAE' }
];

const allTimeZones = [
    { name: 'India (IST)', tz: 'Asia/Kolkata', region: 'भारत' },
    { name: 'New York (EST)', tz: 'America/New_York', region: 'USA' },
    { name: 'London (GMT)', tz: 'Europe/London', region: 'UK' },
    { name: 'Tokyo (JST)', tz: 'Asia/Tokyo', region: 'Japan' },
    { name: 'Sydney (AEDT)', tz: 'Australia/Sydney', region: 'Australia' },
    { name: 'Dubai (GST)', tz: 'Asia/Dubai', region: 'UAE' },
    { name: 'Singapore (SGT)', tz: 'Asia/Singapore', region: 'Singapore' },
    { name: 'Hong Kong (HKT)', tz: 'Asia/Hong_Kong', region: 'Hong Kong' },
    { name: 'Toronto (EST)', tz: 'America/Toronto', region: 'Canada' },
    { name: 'São Paulo (BRT)', tz: 'America/Sao_Paulo', region: 'Brazil' },
    { name: 'Paris (CET)', tz: 'Europe/Paris', region: 'France' },
    { name: 'Berlin (CET)', tz: 'Europe/Berlin', region: 'Germany' },
    { name: 'Moscow (MSK)', tz: 'Europe/Moscow', region: 'Russia' },
    { name: 'Bangkok (ICT)', tz: 'Asia/Bangkok', region: 'Thailand' },
    { name: 'Jakarta (WIB)', tz: 'Asia/Jakarta', region: 'Indonesia' }
];

function formatTime(date, use24 = true) {
    let hours = date.getHours();
    let minutes = date.getMinutes();
    let seconds = date.getSeconds();
    
    if (!use24) {
        hours = hours % 12 || 12;
    }
    
    return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
}

function formatDate(date) {
    const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
    return date.toLocaleDateString('en-US', options);
}

function updateClocks() {
    const container = document.getElementById('clocksContainer');
    container.innerHTML = '';
    
    timeZones.forEach(zone => {
        const date = new Date(new Date().toLocaleString('en-US', { timeZone: zone.tz }));
        const timeStr = formatTime(date, use24Hour);
        const dateStr = formatDate(date);
        
        const card = document.createElement('div');
        card.className = 'clock-card';
        card.innerHTML = `
            <div class="timezone-name">${zone.name}</div>
            <div class="time-display">${timeStr}</div>
            <div class="date-display">${dateStr}</div>
            <div class="region-info">${zone.region}</div>
        `;
        container.appendChild(card);
    });
}

function toggle12Hour() {
    use24Hour = !use24Hour;
    updateClocks();
}

function addRandomTimeZone() {
    const randomZone = allTimeZones[Math.floor(Math.random() * allTimeZones.length)];
    if (!timeZones.find(z => z.tz === randomZone.tz)) {
        timeZones.push(randomZone);
        updateClocks();
    } else {
        alert('This timezone is already displayed!');
    }
}

function resetClocks() {
    timeZones = [
        { name: 'India (IST)', tz: 'Asia/Kolkata', region: 'भारत' },
        { name: 'New York (EST)', tz: 'America/New_York', region: 'USA' },
        { name: 'London (GMT)', tz: 'Europe/London', region: 'UK' },
        { name: 'Tokyo (JST)', tz: 'Asia/Tokyo', region: 'Japan' },
        { name: 'Sydney (AEDT)', tz: 'Australia/Sydney', region: 'Australia' },
        { name: 'Dubai (GST)', tz: 'Asia/Dubai', region: 'UAE' }
    ];
    updateClocks();
}

// Update clocks every second
setInterval(updateClocks, 1000);

// Initial update
updateClocks();
</script>

</body>
</html>
